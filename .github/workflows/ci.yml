name: Template CI

on:
  push:
    paths:
      - '.github/workflows/ci.yml'
      - 'ProjectTemplate.sln'
      - 'src/**'
      - 'tests/**'
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'ProjectTemplate.sln'
      - 'src/**'
      - 'tests/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ProjectTemplate.sln

      - name: Build
        run: dotnet build ProjectTemplate.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ProjectTemplate.sln --configuration Release --no-build
